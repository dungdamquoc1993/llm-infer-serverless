# Build & push image lên GitHub Container Registry (ghcr.io).
# Mỗi lần push lên main/master (và chỉ khi đổi các file liên quan) → image mới.
#
# Image RunPod (GPU Pod): ghcr.io/<owner>/<repo>:latest — entrypoint vLLM serve
# Lần đầu: GitHub → repo → Packages → package vừa tạo → Package settings →
#   Visibility (public/private) và (tuỳ chọn) link với repo.

name: Docker build & push (GHCR)

on:
  push:
    branches: [main, master]
    paths:
      - Dockerfile
      - docker-entrypoint.sh
      - download_model.py
      - .github/workflows/docker-ghcr.yml
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-push:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4

      - name: Image name (GHCR bắt buộc chữ thường)
        run: echo "IMAGE=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}

# Build & push image lên GitHub Container Registry (ghcr.io).
# Image là môi trường fine-tuning (LoRA/QLoRA + unsloth) — không chứa code training.
# Tạo pod với image này, SSH vào, tự viết/upload script training.

name: Docker build & push (GHCR)

on:
  push:
    branches: [main, master]
    paths:
      - Dockerfile
      - .github/workflows/docker-ghcr.yml
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-push:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4

      - name: Image name (GHCR bắt buộc chữ thường)
        run: echo "IMAGE=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
